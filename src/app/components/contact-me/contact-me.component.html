<div class="contact-container">
  <h2>Contact Me</h2>
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" novalidate>
    
    <div class="form-group">
      <input type="text" formControlName="name" placeholder=" " />
      <label>Name</label>
      <div class="error" *ngIf="name?.invalid && name?.touched">Name is required</div>

    </div>

    <div class="form-group">
      <input type="email" formControlName="email" placeholder=" " />
      <label>Email</label>
      <div class="error" *ngIf="email?.invalid && email?.touched">Valid email is required</div>

    </div>

    <div class="form-group">
      <textarea formControlName="message" placeholder=" "></textarea>
      <label>Message</label>
      <div class="error" *ngIf="message?.invalid && message?.touched">Message is required</div>
    </div>

    <button type="submit" [disabled]="contactForm.invalid">Send Message</button>

  </form>

  <p *ngIf="submitted" class="success">Message sent successfully!</p>
</div>
